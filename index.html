<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chúc mừng sinh nhật Mẹ Liễu</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@600;700&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#050009;}

/* ── LETTER SCENE AMBIENT ── */
#letter-bg{
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 52%, rgba(90,20,38,0.75) 0%, rgba(22,5,14,0.92) 58%, #050009 100%);
  transition:opacity 2s ease;
}
#letter-bg.out{opacity:0;pointer-events:none;}

/* ── FLOWER SCENE BG ── */
#scene-bg{
  position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse 200% 80% at 50% 108%, #3c0d1c 0%, #120407 50%, #050009 100%);
  opacity:0;transition:opacity 3.5s ease;
}
#scene-bg.on{opacity:1;}

/* ── STARS ── */
#stars{position:fixed;inset:0;z-index:1;pointer-events:none;}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d,4s) ease-in-out infinite var(--dl,0s);}
@keyframes twinkle{0%,100%{opacity:0;}50%{opacity:var(--op,0.3);}}

/* ── FALLING PETALS ── */
#petals{position:fixed;inset:0;z-index:8;pointer-events:none;opacity:0;transition:opacity 4s ease;}
#petals.on{opacity:1;}
.fp{position:absolute;top:-20px;border-radius:60% 0 60% 0;width:var(--pw,10px);height:var(--pw,10px);background:var(--pc,#f4a0b0);opacity:0;animation:fpfall var(--fd,14s) linear var(--fdl,0s) infinite;}
@keyframes fpfall{0%{opacity:0;top:-20px;transform:rotate(0) translateX(0);}7%{opacity:0.42;}90%{opacity:0.08;}100%{opacity:0;top:110vh;transform:rotate(540deg) translateX(var(--fx,25px));}}

/* ══════════════════════════════════
   ENVELOPE  –  completely rewritten
   Uses perspective on the parent so
   rotateX works reliably cross-browser
══════════════════════════════════ */
#letter-stage{
  position:fixed;inset:0;z-index:20;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;
  transition:opacity 1.1s ease,transform 1.1s ease;
}
#letter-stage.out{opacity:0;transform:scale(0.9) translateY(-18px);pointer-events:none;}

.letter-label{
  font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;
  font-size:11px;letter-spacing:0.38em;text-transform:uppercase;
  color:rgba(232,200,148,0.28);animation:lblink 3.2s ease-in-out infinite;
}
@keyframes lblink{0%,100%{opacity:0.15;}50%{opacity:0.8;}}

/* perspective wrapper — essential for 3-D flap */
.env-scene{
  perspective:900px;
  position:relative;width:360px;height:240px;
  cursor:pointer;user-select:none;
}
.env-scene:hover .env-shadow{transform:translateY(-6px) scale(1.012);}

/* drop-shadow on a separate layer so it doesn't interfere with perspective */
.env-shadow{
  position:absolute;inset:0;border-radius:3px 3px 6px 6px;
  box-shadow:0 12px 44px rgba(0,0,0,0.62),0 3px 12px rgba(150,60,40,0.18);
  transition:transform 0.4s ease;pointer-events:none;z-index:0;
}

/* envelope body */
.env-body{
  position:absolute;inset:0;border-radius:3px 3px 6px 6px;
  background:#f5ecdc;overflow:hidden;z-index:1;
  border:1px solid rgba(172,130,65,0.22);
}
/* linen texture */
.env-body::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(130,90,42,0.022) 3px,rgba(130,90,42,0.022) 4px),
    repeating-linear-gradient(90deg,transparent,transparent 4px,rgba(130,90,42,0.015) 4px,rgba(130,90,42,0.015) 5px);
}
/* inner gold inset */
.env-body::after{content:'';position:absolute;inset:5px;border:1px solid rgba(178,135,55,0.12);border-radius:1px;z-index:4;pointer-events:none;}

/* V folds — all z-index below inner card */
.env-fold-l{position:absolute;inset:0;z-index:2;clip-path:polygon(0 0,0 100%,52% 54%);background:linear-gradient(140deg,#e4c890,#cfa86a);}
.env-fold-r{position:absolute;inset:0;z-index:2;clip-path:polygon(100% 0,100% 100%,48% 54%);background:linear-gradient(222deg,#e4c890,#cfa86a);}
.env-fold-b{position:absolute;bottom:0;left:0;right:0;height:54%;z-index:2;clip-path:polygon(0 100%,50% 0,100% 100%);background:linear-gradient(175deg,#dabe88,#c2a062);}

/* inner letter card — sits z:3 so it slides UP visible over the folds */
.env-card{
  position:absolute;left:18px;right:18px;bottom:9px;
  height:168px;z-index:3;
  background:#fefcf5;
  border:1px solid rgba(178,135,52,0.13);border-radius:1px;
  box-shadow:0 1px 5px rgba(0,0,0,0.055);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;padding:18px;
  /* start position: just inside envelope */
  transform:translateY(0px);
  transition:transform 1s cubic-bezier(0.22,1,0.36,1) 0.35s;
}
.env-card.risen{transform:translateY(-152px);}

.lc-hr{width:32px;height:1px;background:linear-gradient(90deg,transparent,rgba(175,132,48,0.42),transparent);}
.lc-from{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:10.5px;color:#a07840;letter-spacing:0.1em;}
.lc-to{font-family:'Dancing Script',cursive;font-weight:600;font-size:22px;color:#6c1a28;text-align:center;line-height:1.4;}
.lc-open{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:9.5px;color:#be9e58;letter-spacing:0.22em;animation:lblink 2.8s ease-in-out infinite;}

/* ── FLAP  (the key fix: separate element, perspective from .env-scene) ── */
.env-flap{
  position:absolute;top:0;left:0;right:0;height:122px;
  z-index:5;              /* above card so it covers it when closed */
  transform-origin:top center;
  transform-style:preserve-3d;
  transition:transform 1.05s cubic-bezier(0.36,0,0.16,1);
  /* clip to triangle pointing DOWN */
  clip-path:polygon(0 0, 50% 62%, 100% 0);
  background:linear-gradient(176deg,#edd9a8 0%,#dcbd82 55%,#c9a466 100%);
}
/* sheen on flap front */
.env-flap::before{
  content:'';position:absolute;inset:0;
  clip-path:polygon(0 0,50% 62%,100% 0);
  background:linear-gradient(172deg,rgba(255,248,232,0.28) 0%,transparent 48%);
}
.env-flap.open{
  transform:rotateX(-180deg);
  z-index:1;              /* flip behind card once open */
}

/* tap hint */
.tap-hint{
  position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
  z-index:25;pointer-events:none;
  font-family:'Cormorant Garamond',serif;font-style:italic;font-size:10.5px;
  color:rgba(225,195,140,0.2);letter-spacing:0.24em;
  animation:lblink 3.2s ease-in-out infinite;transition:opacity 0.8s;
}

/* ── BOUQUET SVG ── */
#bouquet{position:fixed;inset:0;width:100%;height:100%;z-index:5;pointer-events:none;opacity:0;transition:opacity 0.3s;}
#bouquet.on{opacity:1;}

/* ── MESSAGE ── */
/* ═══════════════════════════════════
   MESSAGE BANNER
═══════════════════════════════════ */
#msg {
  position:fixed; inset:0; z-index:30; pointer-events:none;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  opacity:0; transition:opacity 2.2s ease;
}
#msg.on { opacity:1; }

/* Banner card — the readable panel */
.msg-banner {
  position:relative;
  display:flex; flex-direction:column; align-items:center;
  padding: 44px 58px 40px;
  max-width: min(520px, 88vw);
  /* ivory parchment with subtle warm gradient */
  background:
    radial-gradient(ellipse 140% 110% at 50% 38%, #fdf6e8 0%, #f5e8cc 55%, #eddab0 100%);
  border: 1px solid rgba(185,145,68,0.38);
  border-radius: 3px;
  box-shadow:
    0 0 0 1px rgba(212,168,80,0.12),
    0 28px 90px rgba(0,0,0,0.68),
    0 6px 24px rgba(160,50,70,0.22),
    inset 0 1px 0 rgba(255,252,240,0.9),
    inset 0 -1px 0 rgba(180,140,60,0.15);
  /* very light blur so flowers bleed softly through edges */
  backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
  opacity:0; transform:translateY(20px) scale(0.97);
  transition: opacity 2s ease 0.2s, transform 2s cubic-bezier(0.22,1,0.36,1) 0.2s;
}
/* linen texture overlay */
.msg-banner > * { position:relative; z-index:1; }
.msg-banner-tex {
  position:absolute; inset:0; border-radius:3px; pointer-events:none; z-index:0;
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(140,100,42,0.028) 3px,rgba(140,100,42,0.028) 4px),
    repeating-linear-gradient(90deg,transparent,transparent 4px,rgba(140,100,42,0.018) 4px,rgba(140,100,42,0.018) 5px);
}
#msg.on .msg-banner { opacity:1; transform:translateY(0) scale(1); }

/* decorative corner rules */
.msg-banner::before,
.msg-banner::after {
  content:''; position:absolute;
  width:46px; height:46px;
  border-color:rgba(185,145,55,0.42); border-style:solid;
}
.msg-banner::before { top:13px; left:13px; border-width:1px 0 0 1px; border-radius:1px 0 0 0; }
.msg-banner::after  { bottom:13px; right:13px; border-width:0 1px 1px 0; border-radius:0 0 1px 0; }

/* top ornament line */
.banner-topline {
  position:absolute; top:12px; left:50%; transform:translateX(-50%);
  width:60px; height:1px;
  background:linear-gradient(90deg,transparent,rgba(160,120,40,0.5),transparent);
}
.banner-botline {
  position:absolute; bottom:12px; left:50%; transform:translateX(-50%);
  width:60px; height:1px;
  background:linear-gradient(90deg,transparent,rgba(160,120,40,0.5),transparent);
}

.m-sup {
  font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:300;
  font-size:clamp(0.75rem,1.8vw,1.05rem);
  letter-spacing:0.32em; text-transform:uppercase;
  color:rgba(120,68,28,0.78);
  margin-bottom:6px;
  opacity:0; transform:translateY(8px);
  transition:opacity 1.6s ease 0.5s, transform 1.6s ease 0.5s;
}
#msg.on .m-sup { opacity:1; transform:translateY(0); }

.m-name {
  font-family:'Playfair Display',serif; font-style:italic; font-weight:700;
  font-size:clamp(2.4rem,6.5vw,4.4rem);
  line-height:1.08; text-align:center;
  background:linear-gradient(128deg,#b87810,#8a5208 35%,#c89018 65%,#7a4008);
  -webkit-background-clip:text; background-clip:text; color:transparent;
  animation:mglow 3.2s ease-in-out infinite;
  opacity:0; transform:translateY(10px);
  transition:opacity 1.6s ease 0.9s, transform 1.6s ease 0.9s;
}
#msg.on .m-name { opacity:1; transform:translateY(0); }
@keyframes mglow {
  0%,100%{filter:drop-shadow(0 2px 8px rgba(160,100,10,0.3));}
  50%{filter:drop-shadow(0 3px 18px rgba(180,120,10,0.5));}
}

.m-heart {
  font-size:clamp(1.4rem,3vw,2.1rem); color:#c03860; line-height:1; margin-top:2px;
  animation:mhb 2.1s ease-in-out infinite;
  opacity:0; transform:scale(0.3);
  transition:opacity 1s ease 1.4s, transform 1s cubic-bezier(0.22,1,0.36,1) 1.4s;
}
#msg.on .m-heart { opacity:1; transform:scale(1); }
@keyframes mhb { 0%,100%{transform:scale(1);} 16%{transform:scale(1.09);} 30%{transform:scale(0.95);} }

.m-rule {
  width:120px; height:1px; margin:18px 0;
  background:linear-gradient(90deg,transparent,rgba(160,108,28,0.55),rgba(160,50,70,0.45),rgba(160,108,28,0.55),transparent);
  opacity:0; transform:scaleX(0);
  transition:opacity 1s ease 1.7s, transform 1.1s cubic-bezier(0.22,1,0.36,1) 1.7s;
}
#msg.on .m-rule { opacity:1; transform:scaleX(1); }

.m-wish {
  font-family:'Cormorant Garamond',serif; font-style:italic;
  font-size:clamp(0.95rem,2vw,1.18rem);
  letter-spacing:0.08em; line-height:2.0;
  color:rgba(62,34,14,0.88);
  text-align:center;
  text-shadow: 0 1px 2px rgba(255,240,210,0.6);
  opacity:0; transform:translateY(6px);
  transition:opacity 1.4s ease 2s, transform 1.4s ease 2s;
}
#msg.on .m-wish { opacity:1; transform:translateY(0); }

.m-from {
  margin-top:22px;
  font-family:'Dancing Script',cursive; font-size:1rem;
  color:rgba(130,85,20,0.60); letter-spacing:0.07em;
  opacity:0; transition:opacity 1.2s ease 2.5s;
}
#msg.on .m-from { opacity:1; }
</style>
</head>
<body>

<div id="letter-bg"></div>
<div id="scene-bg"></div>
<div id="stars"></div>
<div id="petals"></div>
<svg id="bouquet" xmlns="http://www.w3.org/2000/svg"></svg>

<!-- ══ LETTER ══ -->
<div id="letter-stage">
  <div class="letter-label">một lá thư nhỏ</div>
  <div class="env-scene" id="env-scene" onclick="openLetter()">
    <div class="env-shadow"></div>
    <div class="env-body">
      <div class="env-fold-l"></div>
      <div class="env-fold-r"></div>
      <div class="env-fold-b"></div>
      <!-- card inside -->
      <div class="env-card" id="env-card">

        <div class="lc-hr"></div>
        <div class="lc-to"> To <br>Mẹ Liễu</div>
        <div class="lc-hr"></div>
        <div class="lc-open">chạm để mở</div>
      </div>
    </div>
    <!-- flap renders on top of everything, flips back when open -->
    <div class="env-flap" id="env-flap"></div>
  </div>
</div>
<div class="tap-hint" id="tap-hint">nhấp vào phong bì để mở</div>

<!-- ══ MESSAGE ══ -->
<div id="msg">
  <div class="msg-banner">
    <div class="msg-banner-tex"></div>
    <div class="banner-topline"></div>
    <div class="banner-botline"></div>
    <div class="m-sup">Chúc Mừng Sinh Nhật</div>
    <div class="m-name">Mẹ Liễu</div>
    <div class="m-heart">&#9829;</div>
    <div class="m-rule"></div>
    <div class="m-wish">Chúc mẹ luôn mạnh khỏe hạnh phúc<br>và tràn đầy yêu thương</div>
    <div class="m-from">— Con Rùa —</div>
  </div>
</div>

<script>
'use strict';
/* ════════════════════════════════════════════════
   STARS
════════════════════════════════════════════════ */
(function(){
  var el=document.getElementById('stars');
  for(var i=0;i<35;i++){
    var s=document.createElement('div');s.className='star';
    var sz=(Math.random()*1.5+0.4).toFixed(1);
    s.style.cssText='left:'+(Math.random()*100).toFixed(1)+'%;top:'+(Math.random()*72).toFixed(1)+'%;width:'+sz+'px;height:'+sz+'px;--d:'+(3.5+Math.random()*5).toFixed(1)+'s;--dl:'+(Math.random()*9).toFixed(1)+'s;--op:'+(0.08+Math.random()*0.28).toFixed(2)+';';
    el.appendChild(s);
  }
})();

/* ════════════════════════════════════════════════
   PETALS
════════════════════════════════════════════════ */
(function(){
  var w=document.getElementById('petals');
  var c=['#f7c5ce','#f4a0b0','#e6789a','#f8d0da','#fcc0d8'];
  for(var i=0;i<18;i++){
    var p=document.createElement('div');p.className='fp';
    p.style.cssText='left:'+(Math.random()*105).toFixed(1)+'%;--pw:'+(7+Math.random()*9).toFixed(0)+'px;--pc:'+c[i%c.length]+';--fd:'+(12+Math.random()*10).toFixed(1)+'s;--fdl:'+(Math.random()*22).toFixed(1)+'s;--fx:'+((Math.random()-0.5)*60).toFixed(0)+'px;';
    w.appendChild(p);
  }
})();

/* ════════════════════════════════════════════════
   SVG BOUQUET ENGINE
════════════════════════════════════════════════ */
var NS='http://www.w3.org/2000/svg';
var GID=0;
function uid(){return 'g'+(++GID);}

/* shared CSS keyframes */
var SS=document.createElement('style');
document.head.appendChild(SS);
var KFS={};
function addCSS(s){SS.textContent+=s;}
addCSS([
  '@keyframes petalOpen{0%{opacity:0;transform:scaleY(0) scaleX(0.06);}16%{opacity:1;}100%{opacity:0.93;transform:scaleY(1) scaleX(1);}}',
  '@keyframes leafIn{from{opacity:0;transform:scale(0.05);}to{opacity:0.9;transform:scale(1);}}',
  '@keyframes cenPop{0%{opacity:0;transform:scale(0);}78%{transform:scale(1.1);}100%{opacity:1;transform:scale(1);}}',
  '@keyframes swL{0%{transform:rotate(-2deg);}100%{transform:rotate(0.8deg);}}',
  '@keyframes swR{0%{transform:rotate(-0.8deg);}100%{transform:rotate(2deg);}}',
  '@keyframes swC{0%{transform:rotate(-1.4deg);}100%{transform:rotate(1.4deg);}}',
].join(''));

function kfStem(name,len){
  if(!KFS[name]){KFS[name]=1;addCSS('@keyframes '+name+'{from{stroke-dashoffset:'+len+'}to{stroke-dashoffset:0}}');}
}

function E(tag,attrs){
  var e=document.createElementNS(NS,tag);
  for(var k in attrs)if(Object.prototype.hasOwnProperty.call(attrs,k))e.setAttribute(k,attrs[k]);
  return e;
}
function rg(defs,id,c1,c2){
  var g=E('radialGradient',{id:id,cx:'50%',cy:'65%',r:'70%'});
  var s1=E('stop',{offset:'0%'});s1.setAttribute('stop-color',c1);
  var s2=E('stop',{offset:'100%'});s2.setAttribute('stop-color',c2);
  g.appendChild(s1);g.appendChild(s2);defs.appendChild(g);
}
function lg(defs,id){
  var g=E('radialGradient',{id:id,cx:'35%',cy:'28%',r:'78%'});
  [['0%','#78cc50'],['48%','#4e8030'],['100%','#2c4e18']].forEach(function(s){
    var st=E('stop',{offset:s[0]});st.setAttribute('stop-color',s[1]);g.appendChild(st);
  });
  defs.appendChild(g);
}
function flt(defs,id,blur){
  var f=E('filter',{id:id,x:'-100%',y:'-100%',width:'300%',height:'300%'});
  var fb=E('feGaussianBlur',{stdDeviation:blur,result:'b'});
  var fm=E('feMerge',{});
  var n1=E('feMergeNode',{'in':'b'}),n2=E('feMergeNode',{'in':'SourceGraphic'});
  fm.appendChild(n1);fm.appendChild(n2);f.appendChild(fb);f.appendChild(fm);defs.appendChild(f);
}
function B(p0,p1,p2,p3,t){var m=1-t;return m*m*m*p0+3*m*m*t*p1+3*m*t*t*p2+t*t*t*p3;}
function arcL(x0,y0,a,b,c,d,x1,y1){
  var l=0,px=x0,py=y0;
  for(var i=1;i<=14;i++){var t=i/14;var nx=B(x0,a,c,x1,t),ny=B(y0,b,d,y1,t);var dx=nx-px,dy=ny-py;l+=Math.sqrt(dx*dx+dy*dy);px=nx;py=ny;}
  return l;
}
function PP(rx,ry,f){
  f=f==null?0.88:f;
  return 'M0,0 C'+(rx*f).toFixed(1)+','+(-(ry*0.11)).toFixed(1)+' '+(rx*(f+0.09)).toFixed(1)+','+(-(ry*0.56)).toFixed(1)+' 0,'+(-(ry*1.01)).toFixed(1)+' C'+(-(rx*(f+0.09))).toFixed(1)+','+(-(ry*0.56)).toFixed(1)+' '+(-(rx*f)).toFixed(1)+','+(-(ry*0.11)).toFixed(1)+' 0,0';
}
function animStem(p,len,dur,delay){
  var L=Math.ceil(len)+'';
  p.setAttribute('stroke-dasharray',L);p.setAttribute('stroke-dashoffset',L);
  var kn='k'+uid();kfStem(kn,L);
  p.style.animation=kn+' '+dur.toFixed(2)+'s ease-out '+delay.toFixed(2)+'s forwards';
}

/* ── DRAW ROSE HEAD ── */
function ROSE(root,defs,hx,hy,layers,cen,pi,pd,t0,gb){
  var fid=uid();flt(defs,fid,gb||'5');
  layers.forEach(function(L,li){
    var gid=uid();rg(defs,gid,L.c1,L.c2);
    var lo=li*(L.n*pi*0.26);
    for(var i=0;i<L.n;i++){
      var ang=(360/L.n)*i+(li%2===1?180/L.n:li===2?90/L.n:0);
      var delay=t0+lo+i*pi;
      var pg=E('g',{transform:'translate('+hx.toFixed(1)+','+hy.toFixed(1)+') rotate('+ang.toFixed(1)+')'});
      var pe=E('path',{d:PP(L.rx,L.ry,L.f),fill:'url(#'+gid+')',opacity:'0'});
      if(li===0)pe.setAttribute('filter','url(#'+fid+')');
      pe.style.transformOrigin='0px 0px';
      pe.style.animation='petalOpen '+pd.toFixed(2)+'s cubic-bezier(0.1,1,0.25,1) '+delay.toFixed(2)+'s forwards';
      var vn=E('path',{d:'M0,0 Q'+(L.rx*0.1).toFixed(1)+','+(-(L.ry*0.5)).toFixed(1)+' 0,'+(-(L.ry*0.88)).toFixed(1),stroke:'rgba(255,255,255,0.11)','stroke-width':'0.8',fill:'none',opacity:'0'});

/* ════════════════════════════════════════════════
   OPEN ENVELOPE — stage-by-stage
════════════════════════════════════════════════ */
var done=false;
function openLetter(){
  if(done)return;done=true;
  document.getElementById('tap-hint').style.opacity='0';

  /* 1. Flap rises (rotateX -186deg for a slight overshoot feel) */
  var flap=document.getElementById('env-flap');
  flap.classList.add('open');

  /* 2. Card slides up out of envelope after flap is ~halfway */
  setTimeout(function(){
    document.getElementById('env-card').classList.add('risen');
  },480);

  /* 3. Whole letter stage fades out */
  setTimeout(function(){
    document.getElementById('letter-stage').classList.add('out');
  },1500);

  /* 4. Letter bg fades, flower bg rises */
  setTimeout(function(){
    document.getElementById('letter-bg').classList.add('out');
    document.getElementById('scene-bg').classList.add('on');
  },1800);

  /* 5. Build & show bouquet */
  setTimeout(function(){
    buildBouquet();
    document.getElementById('bouquet').classList.add('on');
  },2100);

  /* 6. Petals drift in */
  setTimeout(function(){
    document.getElementById('petals').classList.add('on');
  },9000);

  /* 7. Message */
  setTimeout(function(){
    document.getElementById('msg').classList.add('on');
  },21000);
}
